# Render.com configuration for AutoShortsAI Dashboard
# النسخة المجانية بدون Disk — يستخدم GitHub لتخزين الـ DB

services:
  - type: web
    name: autoshortsai-dashboard
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: APP_NAME
        value: AutoShortsAI Dashboard
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "8000"
      - key: ASA_DATABASE_URL
        value: sqlite+aiosqlite:///./data/autoshortsai.db
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: ENABLE_SEED
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
      # المتغيرات اللي لازم تتحط من لوحة Render:
      - key: DASHBOARD_API_KEY
        sync: false
      # لتخزين الـ DB على GitHub (بدل Disk):
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_DB_REPO
        value: akerolos/autoshortsai-dashboard-db
      - key: GITHUB_DB_BRANCH
        value: main
      - key: GITHUB_DB_PATH
        value: dashboard.db
    # ✅ مفيش Disk — مجاني تماماً بدون فيزا
    healthCheckPath: /api/health
    autoDeploy: true
