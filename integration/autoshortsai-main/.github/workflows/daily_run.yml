name: AutoShortsAI Daily Run

on:
  workflow_dispatch: # يشغل فقط عندما يطلبه Cloudflare

permissions:
  contents: write

concurrency:
  group: autoshorts-daily-run
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache Pip Packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache HuggingFace Model
      uses: actions/cache@v3
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-huggingface-MiniLM

    - name: Install FFmpeg & Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install requests

    - name: Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env

    - name: Create token.json from Secret
      run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

    - name: Create client_secrets.json from Secret
      run: echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json

    - name: Run AutoShortsAI
      env:
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
      run: python main.py

    - name: Save Database to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add videos.db
        git commit -m "Update banned ideas & brain memory database [skip ci]" || echo "No changes to commit"
        git push

    # === DASHBOARD SYNC ===
    # نسخ DB كـ Base64 وإرسالها لـ dashboard repo
    - name: Encode DB and trigger dashboard update
      env:
        DASHBOARD_REPO_TOKEN: ${{ secrets.DASHBOARD_REPO_TOKEN }}
        DASHBOARD_REPO: ${{ secrets.DASHBOARD_REPO }}
      run: |
        if [ -z "$DASHBOARD_REPO_TOKEN" ] || [ -z "$DASHBOARD_REPO" ]; then
          echo "⚠️ DASHBOARD_REPO_TOKEN or DASHBOARD_REPO not set. Skipping dashboard sync."
          exit 0
        fi

        echo "📦 Encoding videos.db as base64..."
        DB_CONTENT=$(base64 -w 0 videos.db)
        echo "✅ Encoded ($(echo -n "$DB_CONTENT" | wc -c) chars)"

        echo "📤 Triggering dashboard update..."
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token $DASHBOARD_REPO_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$DASHBOARD_REPO/dispatches" \
          -d "{
            \"event_type\": \"update-dashboard\",
            \"client_payload\": {
              \"db_content\": \"$DB_CONTENT\",
              \"source_run_id\": \"${{ github.run_id }}\",
              \"source_repo\": \"${{ github.repository }}\"
            }
          }")

        echo "Response: $RESPONSE"
        echo "✅ Dashboard update triggered!"

    - name: Notify Dashboard on Failure
      if: failure()
      env:
        DASHBOARD_REPO_TOKEN: ${{ secrets.DASHBOARD_REPO_TOKEN }}
        DASHBOARD_REPO: ${{ secrets.DASHBOARD_REPO }}
      run: |
        if [ -z "$DASHBOARD_REPO_TOKEN" ]; then
          echo "⚠️ DASHBOARD_REPO_TOKEN not set. Skipping notification."
          exit 0
        fi

        curl -s -X POST \
          -H "Authorization: token $DASHBOARD_REPO_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$DASHBOARD_REPO/dispatches" \
          -d "{
            \"event_type\": \"update-dashboard\",
            \"client_payload\": {
              \"db_content\": \"\",
              \"source_run_id\": \"${{ github.run_id }}\",
              \"source_repo\": \"${{ github.repository }}\",
              \"status\": \"failed\"
            }
          }"
        echo "✅ Failure notification sent to dashboard"
