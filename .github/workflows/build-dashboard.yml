name: Build Static Dashboard

# الـ workflow ده بيشتغل تلقائياً لما:
# 1. الـ dashboard repo يوصل push على main
# 2. حد يدخّل DB جديد في مجلد data/ (manual trigger)
# 3. كل يوم الساعة 1 صباحاً (عشان يحدّث الـ charts لو فيه metrics جديدة)

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'static-builder/**'
      - 'frontend/**'
      - 'docs/index.html'
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # يومياً الساعة 1 صباحاً UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-static-dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Generate Static Data
      run: |
        echo "📊 Generating static dashboard data..."
        python static-builder/generate_static_data.py

    - name: Copy Frontend Assets to docs/
      run: |
        echo "📁 Copying frontend assets..."
        # نسخ كل ملفات الـ frontend لـ docs/
        cp -r frontend/assets docs/assets
        cp frontend/assets/icons/favicon.svg docs/favicon.svg
        echo "✅ Assets copied"

    - name: List output
      run: |
        echo "=== Generated files ==="
        find docs/ -type f | sort
        echo ""
        echo "=== Total size ==="
        du -sh docs/

    - name: Commit to repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/
        git commit -m "Auto-build static dashboard [skip ci]" || echo "No changes to commit"
        git push

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Output URL
      run: |
        echo "🎉 Dashboard deployed!"
        echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"
